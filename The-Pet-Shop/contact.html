<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact The Pet Shop Website with questions about pet care, pet supplies, and animal resources.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact The Pet Shop Website</title>
</head>

<body>

    <header>
        <h1>Contact The Pet Shop Website</h1>
    </header>

    <nav>
        <a href="index.html">Home</a> |
        <a href="contact.html">Contact</a>
    </nav>

    <main>
        <section>
            <h2>Get in Touch</h2>
            <p>
                Have a question about pets or pet supplies? Fill out the form below
                and we will get back to you as soon as possible.
            </p>

            <form action="#" method="post">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name"><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email"><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" cols="40"></textarea><br><br>

                <input type="submit" value="Submit">
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 The Pet Shop Website. All rights reserved.</p>
    </footer>

</body>
</html>
